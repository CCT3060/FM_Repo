version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - node --version
            - npm --version
            - npm ci
            - echo "VITE_API_URL=https://d3kz9zxtx6891m.cloudfront.net" >> .env.production
            - if [ "$AWS_BRANCH" = "develop" ]; then echo "VITE_PUBLIC_APP_URL=https://develop.d2af0xn65nyshr.amplifyapp.com" >> .env.production; else echo "VITE_PUBLIC_APP_URL=https://main.d2af0xn65nyshr.amplifyapp.com" >> .env.production; fi
        build:
          commands:
            - npm run build
        postBuild:
          commands:
            - echo "=== Deploying backend to Elastic Beanstalk (branch=${AWS_BRANCH}) ==="
            - AWS_ACCT=$(aws sts get-caller-identity --query Account --output text)
            - EB_BUCKET="elasticbeanstalk-ap-south-1-${AWS_ACCT}"
            - VERSION_LABEL="${EB_APP_NAME}-${AWS_BRANCH}-$(date +%Y%m%d%H%M%S)"
            - cd ../backend
            - zip -r /tmp/backend-deploy.zip . -x "node_modules/*" -x "uploads/*" -x ".env" -x ".env.*"
            - aws s3 cp /tmp/backend-deploy.zip "s3://${EB_BUCKET}/deploys/${VERSION_LABEL}.zip" --region ap-south-1
            - aws elasticbeanstalk create-application-version --application-name "${EB_APP_NAME}" --version-label "${VERSION_LABEL}" --description "Auto-deploy from Amplify branch ${AWS_BRANCH} job ${AWS_JOB_ID}" --source-bundle "S3Bucket=${EB_BUCKET},S3Key=deploys/${VERSION_LABEL}.zip" --region ap-south-1
            - aws elasticbeanstalk update-environment --environment-name "${EB_ENV_NAME}" --version-label "${VERSION_LABEL}" --region ap-south-1
            - echo "=== Backend deployment triggered to ${EB_ENV_NAME} ==="
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    appRoot: frontend
