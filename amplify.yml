version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - node --version
            - npm --version
            - npm ci
            - echo "VITE_API_URL=https://d3kz9zxtx6891m.cloudfront.net" >> .env.production
            - echo "VITE_PUBLIC_APP_URL=https://main.d2af0xn65nyshr.amplifyapp.com" >> .env.production
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    appRoot: frontend
