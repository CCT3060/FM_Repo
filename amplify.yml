version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd frontend
        - nvm use 20 || (nvm install 20 && nvm use 20)
        - node --version
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
