version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - echo "VITE_API_URL=https://d3kz9zxtx6891m.cloudfront.net" >> .env.production
        - echo "VITE_PUBLIC_APP_URL=https://main.d2o5o07rd9wndc.amplifyapp.com" >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
